<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PID Live Mapa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a; --panel: #111827; --border: #1e2d45; --accent: #00d4ff;
    --tram: #ff6b35; --bus: #4ade80; --train: #a78bfa; --ferry: #38bdf8;
    --metro: #fbbf24; --text: #e2e8f0; --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow Condensed', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; z-index: 1000; flex-wrap: wrap; }
  .logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -1px; white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; }
  .api-input { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 260px; }
  .api-input label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .api-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; font-family: 'Space Mono', monospace; font-size: 11px; border-radius: 4px; outline: none; }
  .api-input input:focus { border-color: var(--accent); }
  .btn { border: none; padding: 7px 14px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .btn-load { background: var(--accent); color: var(--bg); }
  .btn-load:disabled { opacity: 0.5; cursor: not-allowed; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; border: 1px solid; background: transparent; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.15s; color: var(--text); }
  .filter-btn.tram  { border-color: var(--tram); }
  .filter-btn.bus   { border-color: var(--bus); }
  .filter-btn.train { border-color: var(--train); }
  .filter-btn.ferry { border-color: var(--ferry); }
  .filter-btn.metro { border-color: var(--metro); }
  .filter-btn.active.tram  { background: var(--tram);  color: #000; }
  .filter-btn.active.bus   { background: var(--bus);   color: #000; }
  .filter-btn.active.train { background: var(--train); color: #000; }
  .filter-btn.active.ferry { background: var(--ferry); color: #000; }
  .filter-btn.active.metro { background: var(--metro); color: #000; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stats-bar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 5px 20px; display: flex; align-items: center; gap: 20px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-val { color: var(--accent); font-weight: 700; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.live  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
  #map { flex: 1; background: #060d1a; }
  .leaflet-tile { filter: brightness(0.65) saturate(0.5) hue-rotate(190deg); }
  .leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; min-width: 210px; }
  .leaflet-popup-tip { background: var(--panel); }
  .popup-header { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .popup-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .popup-row { display: flex; justify-content: space-between; gap: 20px; margin: 3px 0; color: var(--muted); font-size: 13px; }
  .popup-row span:last-child { color: var(--text); font-weight: 500; }
  .popup-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
  .v-marker { display: flex; align-items: center; justify-content: center; border-radius: 4px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 9px; border: 1.5px solid rgba(255,255,255,0.2); box-shadow: 0 2px 6px rgba(0,0,0,0.5); cursor: pointer; white-space: nowrap; padding: 1px 4px; height: 18px; min-width: 18px; }
  .refresh-info { margin-left: auto; }
  .key-status { display: none; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-size: 11px; }
  .key-saved { color: #4ade80; }
  .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; font-family: 'Space Mono', monospace; font-size: 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
  .btn-clear:hover { border-color: #f87171; color: #f87171; }
</style>
</head>
<body>

<header>
  <div class="logo">PID<span>//</span>LIVE</div>
  <div class="api-input">
    <label>API KEY</label>
    <input type="password" id="apiKey" placeholder="Vlož Golemio API klíč..."/>
    <button class="btn btn-load" id="btnLoad" onclick="startTracking()">SPUSTIT</button>
    <div class="key-status" id="keyStatus">
      <span class="key-saved">✓ API klíč uložen</span>
      <button class="btn-clear" onclick="clearKey()">Změnit</button>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn tram active"  onclick="toggleFilter('tram',this)"><div class="dot" style="background:var(--tram)"></div> Tramvaj</button>
    <button class="filter-btn metro active" onclick="toggleFilter('metro',this)"><div class="dot" style="background:var(--metro)"></div> Metro</button>
    <button class="filter-btn bus active"   onclick="toggleFilter('bus',this)"><div class="dot" style="background:var(--bus)"></div> Bus</button>
    <button class="filter-btn train active" onclick="toggleFilter('train',this)"><div class="dot" style="background:var(--train)"></div> Vlak</button>
    <button class="filter-btn ferry active" onclick="toggleFilter('ferry',this)"><div class="dot" style="background:var(--ferry)"></div> Přívoz</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="status-dot" id="statusDot"></div><span id="statusText">Čekám na API klíč</span></div>
  <div class="stat">Vozidel: <span class="stat-val" id="countTotal">—</span></div>
  <div class="stat" style="color:var(--tram)">Tram: <span class="stat-val" id="countTram">—</span></div>
  <div class="stat" style="color:var(--metro)">Metro: <span class="stat-val" id="countMetro">—</span></div>
  <div class="stat" style="color:var(--bus)">Bus: <span class="stat-val" id="countBus">—</span></div>
  <div class="stat" style="color:var(--train)">Vlak: <span class="stat-val" id="countTrain">—</span></div>
  <div class="stat refresh-info" id="lastRefresh"></div>
</div>

<div id="map"></div>

<script>
  var map = L.map('map', { center: [50.0755, 14.4378], zoom: 12, zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

  var markers = {};
  var activeFilters = new Set(['tram','metro','bus','train','ferry']);
  var refreshTimer = null;
  var workingEndpoint = null;

  // GTFS route_type → internal type  (https://gtfs.org/documentation/schedule/reference/#routestxt)
  var TYPE_MAP = {
    0: 'tram',   // Tram / Light Rail
    1: 'metro',  // Subway / Metro
    2: 'train',  // Rail
    3: 'bus',    // Bus
    4: 'ferry',  // Ferry
    5: 'tram',   // Cable Tram
    7: 'train',  // Funicular
    11: 'tram',  // Trolleybus
    12: 'train', // Monorail
    100: 'train', 109: 'train', 400: 'metro', 700: 'bus',
    800: 'tram', 900: 'tram', 1000: 'ferry', 1300: 'train'
  };
  var TYPE_COLOR = { tram:'#ff6b35', bus:'#4ade80', train:'#a78bfa', ferry:'#38bdf8', metro:'#fbbf24' };
  var TYPE_EMOJI = { tram:'🚋', bus:'🚌', train:'🚆', ferry:'⛴', metro:'🚇' };

  function toggleFilter(type, btn) {
    if (activeFilters.has(type)) { activeFilters.delete(type); btn.classList.remove('active'); }
    else { activeFilters.add(type); btn.classList.add('active'); }
    Object.values(markers).forEach(function(m) {
      var show = activeFilters.has(m.vtype);
      if (show && !map.hasLayer(m.marker)) map.addLayer(m.marker);
      if (!show && map.hasLayer(m.marker)) map.removeLayer(m.marker);
    });
  }

  function createIcon(vtype, label) {
    var color = TYPE_COLOR[vtype] || '#94a3b8';
    var html = '<div class="v-marker" style="background:' + color + ';color:#000">' + label + '</div>';
    return L.divIcon({ html: html, className: '', iconSize: null, iconAnchor: [10, 9] });
  }

  function fmtDelay(delay) {
    if (delay == null) return '—';
    var color = delay > 120 ? '#f87171' : delay > 30 ? '#fbbf24' : '#4ade80';
    var sign = delay > 0 ? '+' : '';
    return '<span style="color:' + color + '">' + sign + delay + 's</span>';
  }

  function updateVehicles(features) {
    var seen = {};
    var counts = { tram:0, metro:0, bus:0, train:0, ferry:0 };

    features.forEach(function(f) {
      var p = f.properties;
      var coords = f.geometry && f.geometry.coordinates;
      if (!coords || !p) return;

      var lng = coords[0], lat = coords[1];
      if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;

      // ---- CORRECT PATHS (confirmed from DEBUG) ----
      var gtfs     = p.trip && p.trip.gtfs;
      var lastPos  = p.last_position;
      var tripInfo = p.trip;

      var line      = (gtfs && gtfs.route_short_name) || '?';
      var routeType = (gtfs && gtfs.route_type != null) ? gtfs.route_type : 3;
      var headsign  = (gtfs && gtfs.trip_headsign) || '';
      var tripName  = (gtfs && gtfs.trip_short_name) || '';
      var agency    = (tripInfo && tripInfo.agency_name && tripInfo.agency_name.real) ||
                      (tripInfo && tripInfo.agency_name && tripInfo.agency_name.scheduled) || '';
      var delay     = (lastPos && lastPos.delay && lastPos.delay.actual != null) ? lastPos.delay.actual : null;
      var speed     = (lastPos && lastPos.speed != null) ? Math.round(lastPos.speed * 3.6) : null;
      var bearing   = (lastPos && lastPos.bearing) || 0;
      var state     = (lastPos && lastPos.state_position) || '';
      var nextStopId  = (lastPos && lastPos.next_stop && lastPos.next_stop.id) || '';
      var nextArrival = (lastPos && lastPos.next_stop && lastPos.next_stop.arrival_time) || '';
      var acCond    = (tripInfo && tripInfo.air_conditioned);
      var wheelchair = (tripInfo && tripInfo.wheelchair_accessible);
      var id        = (gtfs && gtfs.trip_id) || (lat + ',' + lng);

      var vtype = TYPE_MAP[routeType] || 'bus';
      seen[id] = true;
      counts[vtype] = (counts[vtype] || 0) + 1;

      // Format next arrival time (HH:MM)
      var nextTime = '';
      if (nextArrival) {
        try { nextTime = nextArrival.substring(11, 16); } catch(e) {}
      }

      // State label
      var stateLabel = state === 'at_stop' ? '🛑 Na zastávce' : state === 'on_track' ? '▶ Na trase' : state;

      // Accessibility icons
      var icons = '';
      if (wheelchair) icons += ' ♿';
      if (acCond) icons += ' ❄';

      var color = TYPE_COLOR[vtype] || '#94a3b8';
      var emoji = TYPE_EMOJI[vtype] || '🚌';
      var displayLine = tripName || line;

      var popupHtml =
        '<div class="popup-header" style="color:' + color + '">' + emoji + ' ' + line + '</div>' +
        (headsign ? '<div class="popup-sub">→ ' + headsign + icons + '</div>' : '') +
        '<hr class="popup-divider">' +
        (agency ? '<div class="popup-row"><span>Dopravce</span><span>' + agency + '</span></div>' : '') +
        (tripName ? '<div class="popup-row"><span>Spoj</span><span>' + tripName + '</span></div>' : '') +
        '<div class="popup-row"><span>Stav</span><span>' + stateLabel + '</span></div>' +
        (nextStopId ? '<div class="popup-row"><span>Příští zast.</span><span>' + nextStopId + (nextTime ? ' ' + nextTime : '') + '</span></div>' : '') +
        (speed != null ? '<div class="popup-row"><span>Rychlost</span><span>' + speed + ' km/h</span></div>' : '') +
        '<div class="popup-row"><span>Zpoždění</span><span>' + fmtDelay(delay) + '</span></div>' +
        '<div class="popup-row"><span>Směr</span><span>' + bearing + '°</span></div>';

      if (markers[id]) {
        markers[id].marker.setLatLng([lat, lng]);
        markers[id].marker.setIcon(createIcon(vtype, line));
        if (markers[id].marker.getPopup()) markers[id].marker.setPopupContent(popupHtml);
        markers[id].vtype = vtype;
      } else {
        var marker = L.marker([lat, lng], { icon: createIcon(vtype, line) });
        marker.bindPopup(popupHtml, { maxWidth: 280 });
        markers[id] = { marker: marker, vtype: vtype };
        if (activeFilters.has(vtype)) map.addLayer(marker);
      }
    });

    Object.keys(markers).forEach(function(id) {
      if (!seen[id]) { map.removeLayer(markers[id].marker); delete markers[id]; }
    });

    var total = Object.values(counts).reduce(function(a,b){return a+b;},0);
    document.getElementById('countTotal').textContent = total;
    document.getElementById('countTram').textContent  = counts.tram  || 0;
    document.getElementById('countMetro').textContent = counts.metro || 0;
    document.getElementById('countBus').textContent   = counts.bus   || 0;
    document.getElementById('countTrain').textContent = counts.train || 0;
    document.getElementById('lastRefresh').textContent = 'Aktualizováno: ' + new Date().toLocaleTimeString('cs-CZ');
  }

  // Strip any non-ASCII / non-printable chars from API key (fixes ISO-8859-1 header error)
  function sanitizeKey(raw) {
    return raw.trim().replace(/[^\x20-\x7E]/g, '');
  }

  async function fetchVehicles() {
    var key = sanitizeKey(document.getElementById('apiKey').value);
    if (!key) return;
    var dot = document.getElementById('statusDot');
    var statusText = document.getElementById('statusText');

    var ep = workingEndpoint || 'https://api.golemio.cz/v2/vehiclepositions';
    try {
      var headers = new Headers();
      headers.append('X-Access-Token', key);
      var res = await fetch(ep + '?limit=10000&includeNotTracking=false', {
        method: 'GET',
        headers: headers
      });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
      var data = await res.json();
      var features = data.features || (Array.isArray(data) ? data : []);
      workingEndpoint = ep;
      dot.className = 'status-dot live';
      statusText.textContent = 'ŽIVĚ ✓ (' + features.length + ' vozidel)';
      updateVehicles(features);
    } catch(e) {
      dot.className = 'status-dot error';
      statusText.textContent = '❌ ' + e.message;
      console.error('Fetch error:', e);
      workingEndpoint = null;
    }
  }

  function showKeyInput() {
    document.getElementById('apiKey').style.display = '';
    document.getElementById('btnLoad').style.display = '';
    document.getElementById('keyStatus').style.display = 'none';
  }

  function clearKey() {
    try { localStorage.removeItem('pid_api_key'); } catch(e) {}
    document.getElementById('apiKey').value = '';
    showKeyInput();
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = 'Čekám na API klíč';
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    Object.keys(markers).forEach(function(id) { map.removeLayer(markers[id].marker); });
    markers = {};
    workingEndpoint = null;
    ['countTotal','countTram','countMetro','countBus','countTrain'].forEach(function(id){
      document.getElementById(id).textContent = '—';
    });
    document.getElementById('lastRefresh').textContent = '';
  }

  function startTracking() {
    var key = sanitizeKey(document.getElementById('apiKey').value);
    if (!key) { alert('Vlož Golemio API klíč!'); return; }
    try { localStorage.setItem('pid_api_key', key); } catch(e) {}
    // Hide input, show "klíč uložen" status
    document.getElementById('apiKey').style.display = 'none';
    document.getElementById('btnLoad').style.display = 'none';
    document.getElementById('keyStatus').style.display = 'flex';
    var btn = document.getElementById('btnLoad');
    btn.disabled = true; btn.textContent = 'NAČÍTÁM...';
    if (refreshTimer) clearInterval(refreshTimer);
    fetchVehicles().then(function() {
      btn.textContent = 'ŽIVĚ ✓';
      refreshTimer = setInterval(fetchVehicles, 15000);
    });
  }

  document.getElementById('apiKey').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') startTracking();
  });

  // On page load: restore saved key and auto-start
  (function() {
    var saved = '';
    try { saved = localStorage.getItem('pid_api_key') || ''; } catch(e) {}
    if (saved) {
      document.getElementById('apiKey').value = saved;
      document.getElementById('apiKey').style.display = 'none';
      document.getElementById('btnLoad').style.display = 'none';
      document.getElementById('keyStatus').style.display = 'flex';
      startTracking();
    }
  })();
</script>
</body>
</html>
